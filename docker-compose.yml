version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    command: postgres -c max_connections=200 -c shared_buffers=128MB
    environment:
      POSTGRES_USER: upmon
      POSTGRES_PASSWORD: upmon
      POSTGRES_DB: upmon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upmon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
