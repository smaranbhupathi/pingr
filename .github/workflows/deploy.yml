name: Test and Deploy

# Trigger: run on every push to main and on pull requests targeting main.
# Pull requests only run the test job — no deploys.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  # Always runs. If this fails, nothing else runs.
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  # ── Job 2: Migrate ───────────────────────────────────────────────────────────
  # Runs DB migrations BEFORE deploying new code.
  # If a migration fails, the deploy jobs never start — old code keeps running
  # against the old schema. This is the safety guarantee.
  # Only runs on push to main (not on pull requests).
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        # DATABASE_URL is stored in GitHub repo Settings → Secrets → Actions.
        # It's the Neon connection string.
        run: migrate -path ./migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Job 3: Deploy API ────────────────────────────────────────────────────────
  # Runs after migrations succeed.
  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        # --remote-only = Fly builds the Docker image on their infrastructure.
        # We don't need Docker installed on the GitHub runner.
        run: flyctl deploy --config fly.api.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Job 4: Deploy Worker ─────────────────────────────────────────────────────
  # Also runs after migrations, in parallel with deploy-api.
  deploy-worker:
    name: Deploy Worker to Fly.io
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Worker
        run: flyctl deploy --config fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
