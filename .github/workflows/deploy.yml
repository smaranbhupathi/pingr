name: Test and Deploy

# Trigger: run on every push to main and on pull requests targeting main.
# Pull requests only run the test job — no deploys.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  # Always runs. If this fails, nothing else runs.
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  # ── Job 2: Migrate ───────────────────────────────────────────────────────────
  # Runs DB migrations BEFORE Railway deploys new code.
  # Railway has "Wait for CI" enabled — it will not deploy until this job
  # (and the test job above) pass. So the guarantee is:
  #   tests pass → migrations run → Railway deploys
  # If migrations fail, Railway never deploys — old code keeps running safely.
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        # We use pgx5:// instead of postgres:// because the default pq driver
        # doesn't support Neon's SCRAM-SHA-256 authentication. pgx5 does.
        run: |
          PGX_URL="${DATABASE_URL/postgres:\/\//pgx5://}"
          PGX_URL="${PGX_URL/postgresql:\/\//pgx5://}"
          migrate -path ./migrations -database "$PGX_URL" up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── No deploy jobs ────────────────────────────────────────────────────────────
  # Railway deploys automatically when this workflow passes.
  # In Railway dashboard both services have "Wait for CI" = ON, which means
  # Railway watches GitHub Actions and only deploys after all checks are green.
  # This keeps the pipeline simple — no Railway tokens needed in GitHub secrets.
