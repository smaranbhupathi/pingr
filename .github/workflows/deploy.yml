name: Test and Deploy

# Trigger: run on every push to main and on pull requests targeting main.
# Pull requests only run the test job — no deploys.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  # Always runs. If this fails, nothing else runs.
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go test ./...

  # ── Job 2: Migrate ───────────────────────────────────────────────────────────
  # Runs DB migrations BEFORE deploying new code.
  # If a migration fails, the deploy jobs never start — old code keeps running
  # against the old schema. This is the safety guarantee.
  # Only runs on push to main (not on pull requests).
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz \
            | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        # We use pgx5:// instead of postgres:// because the default pq driver
        # doesn't support Neon's SCRAM-SHA-256 authentication. pgx5 does.
        run: |
          PGX_URL="${DATABASE_URL/postgres:\/\//pgx5://}"
          PGX_URL="${PGX_URL/postgresql:\/\//pgx5://}"
          migrate -path ./migrations -database "$PGX_URL" up
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Job 3: Deploy API ────────────────────────────────────────────────────────
  # Runs after migrations succeed.
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        # RAILWAY_TOKEN and RAILWAY_SERVICE_API are stored in GitHub Secrets.
        # --detach = don't wait for deployment to finish (faster CI).
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_API }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Job 4: Deploy Worker ─────────────────────────────────────────────────────
  # Also runs after migrations, in parallel with deploy-api.
  deploy-worker:
    name: Deploy Worker to Railway
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Worker
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_WORKER }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
